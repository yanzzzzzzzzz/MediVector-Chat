services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      TOP_K: ${TOP_K:-5}
      REFERENCE_CANDIDATE_LIMIT: ${REFERENCE_CANDIDATE_LIMIT:-20}
      MAX_REFERENCE_DISTANCE: ${MAX_REFERENCE_DISTANCE:-0.65}
      REFERENCE_DISTANCE_MARGIN: ${REFERENCE_DISTANCE_MARGIN:-0.12}
      MEMORY_MESSAGES: ${MEMORY_MESSAGES:-10}
      MAX_EMBEDDING_CHARS: ${MAX_EMBEDDING_CHARS:-6000}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-medivector}
      PG_PASSWORD: ${PG_PASSWORD:-medivector}
      PG_DATABASE: ${PG_DATABASE:-medivector}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-health-education-files}
      MINIO_SECURE: "false"
    depends_on:
      - postgres
      - minio

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-medivector}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-medivector}
      POSTGRES_DB: ${PG_DATABASE:-medivector}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
